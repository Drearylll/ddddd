<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go - 和 AI 朋友聊聊</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定义动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message-animation {
            animation: fadeIn 0.3s ease-out;
        }
        
        /* 打字机效果 */
        .typing-indicator span {
            animation: typing 1.4s infinite both;
        }
        
        .typing-indicator span:nth-child(2) {
            animation-delay: 0.2s;
        }
        
        .typing-indicator span:nth-child(3) {
            animation-delay: 0.4s;
        }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 3px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a8a8a8;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-purple-500 via-pink-500 to-indigo-600 min-h-screen">
    
    <!-- 主容器 -->
    <div class="max-w-2xl mx-auto h-screen flex flex-col bg-white shadow-2xl">
        
        <!-- 头部 -->
        <div class="p-4 border-b border-gray-100 flex items-center justify-between bg-white sticky top-0 z-10">
            <div class="flex items-center gap-3">
                <!-- Go 头像 -->
                <div class="w-12 h-12 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex items-center justify-center text-white font-bold text-lg shadow-md">
                    G
                </div>
                <div>
                    <h3 class="font-semibold text-gray-800 text-lg">Go</h3>
                    <p class="text-xs text-green-500 flex items-center gap-1">
                        <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                        在线
                    </p>
                </div>
            </div>
            
            <!-- 设置按钮 -->
            <button onclick="showSettings()" class="p-2 hover:bg-gray-100 rounded-full transition">
                <svg class="w-6 h-6 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
            </button>
        </div>
        
        <!-- 消息列表 -->
        <div id="messageList" class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50">
            <!-- 欢迎消息 -->
            <div class="flex justify-start message-animation">
                <div class="flex items-start gap-2 max-w-[80%]">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex-shrink-0 flex items-center justify-center text-white text-sm font-bold">
                        G
                    </div>
                    <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-none shadow-sm">
                        <p class="text-gray-800 text-sm leading-relaxed">
                            嗨！我是 Go，你的 AI 朋友 👋
                        </p>
                        <p class="text-gray-800 text-sm leading-relaxed mt-1">
                            今天想和我聊些什么呢？无论是心情、想法，还是想去哪里玩，都可以告诉我哦～
                        </p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 输入区域 -->
        <div class="p-4 border-t border-gray-100 bg-white">
            <!-- 快捷回复建议 -->
            <div id="quickReplies" class="flex gap-2 mb-3 overflow-x-auto pb-2">
                <button onclick="sendQuickReply('今天心情不太好')" class="px-4 py-2 bg-purple-50 text-purple-600 rounded-full text-sm whitespace-nowrap hover:bg-purple-100 transition">
                    今天心情不太好
                </button>
                <button onclick="sendQuickReply('想去海边走走')" class="px-4 py-2 bg-blue-50 text-blue-600 rounded-full text-sm whitespace-nowrap hover:bg-blue-100 transition">
                    想去海边走走
                </button>
                <button onclick="sendQuickReply('有什么推荐的地方吗')" class="px-4 py-2 bg-pink-50 text-pink-600 rounded-full text-sm whitespace-nowrap hover:bg-pink-100 transition">
                    有什么推荐的地方吗
                </button>
            </div>
            
            <!-- 输入框 -->
            <div class="flex gap-2">
                <input 
                    type="text" 
                    id="messageInput"
                    placeholder="和 Go 聊聊..."
                    class="flex-1 px-4 py-3 border border-gray-200 rounded-full focus:outline-none focus:ring-2 focus:ring-purple-500 focus:border-transparent transition text-sm"
                    onkeypress="handleKeyPress(event)"
                >
                <button 
                    id="sendBtn"
                    onclick="sendMessage()"
                    class="px-6 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-full hover:opacity-90 transition font-medium shadow-md disabled:opacity-50 disabled:cursor-not-allowed"
                >
                    发送
                </button>
            </div>
            
            <!-- 底部提示 -->
            <p class="text-xs text-gray-400 text-center mt-2">
                Go 会理解你的想法，为你推荐合适的地方和活动
            </p>
        </div>
    </div>
    
    <!-- 设置弹窗 -->
    <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 max-w-sm w-full shadow-xl">
            <h3 class="text-lg font-semibold mb-4">设置</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">AI 性格</label>
                    <select id="aiPersonality" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="warm">温暖治愈型</option>
                        <option value="active">活力阳光型</option>
                        <option value="thoughtful">深度思考型</option>
                        <option value="humorous">幽默风趣型</option>
                    </select>
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">对话风格</label>
                    <select id="conversationStyle" class="w-full px-3 py-2 border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="casual">轻松随意</option>
                        <option value="formal">正式礼貌</option>
                        <option value="intimate">亲密朋友</option>
                    </select>
                </div>
            </div>
            
            <div class="mt-6 flex gap-2">
                <button onclick="saveSettings()" class="flex-1 px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg hover:opacity-90 transition font-medium">
                    保存
                </button>
                <button onclick="closeSettings()" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition font-medium">
                    取消
                </button>
            </div>
        </div>
    </div>
    
    <script>
        let currentSettings = {
            personality: 'warm',
            style: 'casual'
        };
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', () => {
            loadSettings();
            scrollToBottom();
        });
        
        // 处理回车发送
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 发送快捷回复
        function sendQuickReply(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }
        
        // 发送消息
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            const sendBtn = document.getElementById('sendBtn');
            const quickReplies = document.getElementById('quickReplies');
            
            // 禁用输入
            input.disabled = true;
            sendBtn.disabled = true;
            quickReplies.style.display = 'none';
            
            // 添加用户消息到聊天
            addUserMessage(message);
            
            // 清空输入框
            input.value = '';
            
            // 显示正在输入
            showTypingIndicator();
            
            try {
                // 调用后端 API
                const response = await fetch('/api/go_chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        settings: currentSettings
                    })
                });
                
                const data = await response.json();
                
                // 移除正在输入指示
                removeTypingIndicator();
                
                if (data.success) {
                    // 添加 AI 回复
                    addAIMessage(data.reply, data.intent);
                    
                    // 如果有意图识别，隐藏快捷回复
                    if (data.intent && data.intent.intent_type !== 'other') {
                        quickReplies.style.display = 'none';
                        
                        // 显示生成打卡照的提示
                        setTimeout(() => {
                            showMomentSuggestion(data.intent);
                        }, 1000);
                    } else {
                        // 恢复快捷回复
                        quickReplies.style.display = 'flex';
                    }
                } else {
                    addSystemMessage('抱歉，我好像走神了... 能再说一遍吗？🥺');
                    quickReplies.style.display = 'flex';
                }
                
            } catch (error) {
                console.error('发送消息失败:', error);
                removeTypingIndicator();
                addSystemMessage('网络开小差了，请检查连接后重试');
                quickReplies.style.display = 'flex';
            } finally {
                // 恢复输入
                input.disabled = false;
                sendBtn.disabled = false;
                input.focus();
            }
        }
        
        // 添加用户消息
        function addUserMessage(text) {
            const messageList = document.getElementById('messageList');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex justify-end message-animation';
            messageDiv.innerHTML = `
                <div class="bg-gradient-to-r from-purple-500 to-pink-500 text-white px-4 py-3 rounded-2xl rounded-tr-none shadow-md max-w-xs break-words">
                    <p class="text-sm leading-relaxed">${escapeHtml(text)}</p>
                </div>
            `;
            
            messageList.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 添加 AI 消息
        function addAIMessage(text, intent = null) {
            const messageList = document.getElementById('messageList');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'flex justify-start message-animation';
            messageDiv.innerHTML = `
                <div class="flex items-start gap-2 max-w-[80%]">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex-shrink-0 flex items-center justify-center text-white text-sm font-bold">G</div>
                    <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-none shadow-sm">
                        <p class="text-gray-800 text-sm leading-relaxed">${escapeHtml(text)}</p>
                        ${intent ? `<p class="text-xs text-gray-400 mt-2">💡 已记录：${formatIntent(intent)}</p>` : ''}
                    </div>
                </div>
            `;
            
            messageList.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 添加系统消息
        function addSystemMessage(text) {
            const messageList = document.getElementById('messageList');
            
            const messageDiv = document.createElement('div');
            messageDiv.className = 'text-center text-xs text-gray-400 my-4 message-animation';
            messageDiv.textContent = text;
            
            messageList.appendChild(messageDiv);
            scrollToBottom();
        }
        
        // 显示正在输入
        function showTypingIndicator() {
            const messageList = document.getElementById('messageList');
            
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'flex justify-start message-animation';
            indicator.innerHTML = `
                <div class="flex items-start gap-2">
                    <div class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-pink-500 flex-shrink-0 flex items-center justify-center text-white text-sm font-bold">G</div>
                    <div class="bg-white px-4 py-3 rounded-2xl rounded-tl-none shadow-sm">
                        <div class="typing-indicator flex gap-1">
                            <span class="w-2 h-2 bg-gray-400 rounded-full block"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full block"></span>
                            <span class="w-2 h-2 bg-gray-400 rounded-full block"></span>
                        </div>
                    </div>
                </div>
            `;
            
            messageList.appendChild(indicator);
            scrollToBottom();
        }
        
        // 移除正在输入
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }
        
        // 显示打卡照建议
        function showMomentSuggestion(intent) {
            const location = intent.location || '某个地方';
            const activity = intent.activity || '做些有趣的事';
            
            const messageList = document.getElementById('messageList');
            
            const suggestionDiv = document.createElement('div');
            suggestionDiv.className = 'bg-gradient-to-r from-purple-50 to-pink-50 border border-purple-100 rounded-xl p-4 my-4 message-animation';
            suggestionDiv.innerHTML = `
                <p class="text-sm text-gray-700 mb-3">✨ 听起来你想 <strong>${location}</strong> <strong>${activity}</strong></p>
                <button onclick="generateMoment('${location}', '${activity}')" class="w-full px-4 py-2 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-lg hover:opacity-90 transition font-medium text-sm shadow-md">
                    📸 生成打卡照
                </button>
            `;
            
            messageList.appendChild(suggestionDiv);
            scrollToBottom();
        }
        
        // 格式化意图显示
        function formatIntent(intent) {
            const parts = [];
            if (intent.location) parts.push(`📍 ${intent.location}`);
            if (intent.activity) parts.push(`🎯 ${intent.activity}`);
            if (intent.mood) parts.push(`💭 ${intent.mood}`);
            return parts.join(' · ');
        }
        
        // 滚动到底部
        function scrollToBottom() {
            const messageList = document.getElementById('messageList');
            messageList.scrollTop = messageList.scrollHeight;
        }
        
        // HTML 转义
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // 显示设置
        function showSettings() {
            document.getElementById('settingsModal').classList.remove('hidden');
        }
        
        // 关闭设置
        function closeSettings() {
            document.getElementById('settingsModal').classList.add('hidden');
        }
        
        // 保存设置
        function saveSettings() {
            currentSettings.personality = document.getElementById('aiPersonality').value;
            currentSettings.style = document.getElementById('conversationStyle').value;
            
            localStorage.setItem('go_settings', JSON.stringify(currentSettings));
            
            closeSettings();
            addSystemMessage('设置已保存 ✨');
        }
        
        // 加载设置
        function loadSettings() {
            const saved = localStorage.getItem('go_settings');
            if (saved) {
                currentSettings = JSON.parse(saved);
                document.getElementById('aiPersonality').value = currentSettings.personality;
                document.getElementById('conversationStyle').value = currentSettings.style;
            }
        }
        
        // 生成打卡照（占位函数）
        function generateMoment(location, activity) {
            alert(`即将为你生成在 ${location} ${activity} 的打卡照！\n\n这个功能将在下一步实现～`);
        }
    </script>
</body>
</html>
